<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Haven</title>
<style>

body {
    font-family: "Georgia", serif;
    background-color: #f5eee6;
    color: #4b2e2e;
    display: grid;
    grid-template-areas:
        "header"
        "nav"
        "main"
        "footer";
}

.header {
    grid-area: header;
    background-color: #6f4e37;
    color: white;
    text-align: center;
    padding: 30px;
    border-radius: 5px;
}

.header h1 {
    font-family: "Brush Script MT", cursive;
    font-size: 3rem;
    margin: 10px;
}

.nav {
    grid-area: nav;
    background-color: #8b5e3c;
    padding: 10px;
}

.nav ul {
    display: flex;
    justify-content: center;
    gap: 50px;
    list-style: none;
}

.nav a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}


.main-content {
    grid-area: main;
    padding: 40px;
    text-align: center;
}

.main-content h2 {
    margin-bottom: 25px;
    font-size: 2rem;
}

.flex-container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.flex-item {
    background-color: #d2b48c;
    color: #3e2723;
    padding: 25px;
    width: 180px;
    border-radius: 10px;
    font-size: 1.2rem;
    font-weight: bold;
    box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
}

.footer {
    grid-area: footer;
    background-color: #6f4e37;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>
<header class="header">
    <h1>Java Haven</h1>
    <p>Your daily dose of caffeine and comfort.</p>
</header>
  
<nav class="nav">
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
</nav>
  
<main class="main-content">
    <h2>Featured Coffees</h2>
    <div class="flex-container">
        <div class="flex-item">Espresso</div>
        <div class="flex-item">Cappuccino</div>
        <div class="flex-item">Latte</div>
        <div class="flex-item">Mocha</div>
    </div>
</main>
  
<footer class="footer">
    <p>&copy; 2025 Java Haven. All Rights Reserved.</p>
</footer>
</body>
</html>
